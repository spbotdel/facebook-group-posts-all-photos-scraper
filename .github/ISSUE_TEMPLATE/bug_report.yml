name: Bug report
description: Report a public Facebook group parsing, media, timestamp, or pagination issue.
title: "[bug]: "
labels:
  - bug
body:
  - type: markdown
    attributes:
      value: |
        Please do not include tokens, cookies, private group content, or personal data.
  - type: input
    id: run_id
    attributes:
      label: Apify run ID
      description: The run ID where the issue happened.
  - type: input
    id: group_url
    attributes:
      label: Public group URL
      description: The public Facebook group URL.
  - type: dropdown
    id: issue_type
    attributes:
      label: Issue type
      options:
        - Missing text
        - Missing photos
        - Timestamp issue
        - Pagination or cursor issue
        - Actor failed
        - Other
    validations:
      required: true
  - type: textarea
    id: details
    attributes:
      label: Details
      description: What happened, what you expected, and one public post URL if available.
    validations:
      required: true
